name: fortune_fusion
description: 統合占術アプリ — 四柱推命・西洋占星術・九星気学
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 状態管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # ルーティング
  go_router: ^14.0.0
  # ローカルDB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  # 設定保存
  shared_preferences: ^2.2.3
  # 位置情報（出生地入力補助）
  geocoding: ^3.0.0
  # UI
  flutter_svg: ^2.0.10
  # 日付操作
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/tables/
